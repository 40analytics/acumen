# Acumen — Cloud Build for STAGING (push to `staging` branch)
# Builds + deploys: marketing, app-client, app-server to Cloud Run.

substitutions:
  _ENV: staging
  _REGION: us-central1
  _AR_REPO: acumen
  _MARKETING_URL: https://staging.acumen.40analytics.com
  _APP_URL: https://app-staging.acumen.40analytics.com
  _API_URL: https://api-staging.acumen.40analytics.com

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/marketing:${_ENV}-${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app-client:${_ENV}-${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app-server:${_ENV}-${SHORT_SHA}

steps:
  # ─── 1. BUILD ──────────────────────────────────────────
  - id: build-marketing
    name: gcr.io/cloud-builders/docker
    dir: apps/marketing
    args:
      - build
      - --build-arg
      - PUBLIC_APP_URL=${_APP_URL}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/marketing:${_ENV}-${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/marketing:${_ENV}-latest
      - .

  - id: build-app-server
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/app/server/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app-server:${_ENV}-${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app-server:${_ENV}-latest
      - .

  - id: build-app-client
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/app/client/Dockerfile
      - --build-arg
      - VITE_API_URL=${_API_URL}
      - --build-arg
      - VITE_MARKETING_URL=${_MARKETING_URL}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app-client:${_ENV}-${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app-client:${_ENV}-latest
      - .

  # ─── 2. PUSH ───────────────────────────────────────────
  - id: push-marketing
    name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/marketing']
    waitFor: [build-marketing]

  - id: push-app-server
    name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app-server']
    waitFor: [build-app-server]

  - id: push-app-client
    name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app-client']
    waitFor: [build-app-client]

  # ─── 3. DEPLOY ─────────────────────────────────────────
  - id: deploy-marketing
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - acumen-marketing-${_ENV}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/marketing:${_ENV}-${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --concurrency=200
    waitFor: [push-marketing]

  - id: deploy-app-server
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - acumen-app-server-${_ENV}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app-server:${_ENV}-${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --concurrency=80
      - --timeout=120s
      - --set-env-vars=NODE_ENV=production,APP_URL=${_APP_URL},API_URL=${_API_URL},MARKETING_URL=${_MARKETING_URL},COOKIE_DOMAIN=.acumen.40analytics.com,EMAIL_FROM=Acumen <acumen@40analytics.com>,PAYSTACK_CURRENCY=GHS,PAYSTACK_USD_RATE=12,ADMIN_EMAIL=mawuli@40analytics.com
      - --set-secrets=DATABASE_URL=ACUMEN_DATABASE_URL_STAGING:latest,BETTER_AUTH_SECRET=ACUMEN_BETTER_AUTH_SECRET_STAGING:latest,GOOGLE_CLIENT_ID=ACUMEN_GOOGLE_CLIENT_ID_STAGING:latest,GOOGLE_CLIENT_SECRET=ACUMEN_GOOGLE_CLIENT_SECRET_STAGING:latest,RESEND_API_KEY=ACUMEN_RESEND_API_KEY_STAGING:latest,PAYSTACK_SECRET_KEY=ACUMEN_PAYSTACK_SECRET_KEY_STAGING:latest,PAYSTACK_PUBLIC_KEY=ACUMEN_PAYSTACK_PUBLIC_KEY_STAGING:latest,ADMIN_USERNAME=ACUMEN_ADMIN_USERNAME_STAGING:latest,ADMIN_PASSWORD=ACUMEN_ADMIN_PASSWORD_STAGING:latest,ADMIN_JWT_SECRET=ACUMEN_ADMIN_JWT_SECRET_STAGING:latest
    waitFor: [push-app-server]

  - id: deploy-app-client
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - acumen-app-client-${_ENV}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app-client:${_ENV}-${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --concurrency=200
    waitFor: [push-app-client]
